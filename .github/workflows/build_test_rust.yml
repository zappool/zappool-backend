name: Build and test Rust

on:
  push:
    branches: [ "main", "staging", "multi", "braiins" ]
  pull_request:
    branches: [ "main", "staging", "multi", "braiins" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    # - name: Set up Rust
    #   run: sudo apt-get install cargo && rustup override set 1.85
    - uses: dtolnay/rust-toolchain@stable
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2
    - name: Build Rust
      run: |
        cargo build
        # The rest should be also moved to common building
        cd paycalc-rs && cargo build && cd ..

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    # - name: Set up Rust
    #   run: sudo apt-get install cargo && rustup override set 1.85
    - uses: dtolnay/rust-toolchain@stable
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2
    - name: Run unit tests
      run: |
        cargo test
        # The rest should be also moved to common building
        cd paycalc-rs && cargo test && cd ..

  check:
    name: Check fmt, clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: |
          cargo fmt --all -- --check
          cd paycalc-rs && cargo fmt --all -- --check && cd ..
          # cargo clippy --all-features -- -D warnings
